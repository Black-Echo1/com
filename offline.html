<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لا يوجد اتصال | ArabDub Hub </title>
    <style>
        body {
            background-color: #090a0f; /* لون خلفية الموقع */
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1 {
            color: var(--accent-red, #e50914); /* لون الأزرار الأحمر */
            margin-bottom: 10px;
        }
        p {
            color: #cccccc;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }
        .retry-btn {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .retry-btn:hover {
            background-color: #b20710;
        }
    </style>
</head>
<body>
    <div class="icon">🚫📶</div>
    <h1>انقطع الاتصال بالإنترنت</h1>
    <p>عذراً، يبدو أنك فقدت الاتصال بالشبكة.<br>يرجى التحقق من اتصالك للعودة لمشاهدة أحدث أعمال الدبلجة.</p>
    <!-- هذا الزر يقوم بتحديث الصفحة تلقائياً عند عودة النت -->
    <button class="retry-btn" onclick="window.location.reload()">إعادة المحاولة</button>
</body>
</html>
