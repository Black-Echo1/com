<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="V5K4gME715mhjvvhA7y2I6dHxR_x2pxBjrQPpJE_d04" />
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>مكتبة الشباب - Black Echo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../icon-192.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../css/style.css">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('../sw.js').catch(err => console.log('SW Error:', err));
        });
      }
    </script>
</head>
<body class="animated-bg">
   <header class="main-header">
        <div class="logo">
            <div class="logo rgb-text">ArabDub Hub</div>    
        </div>
        <div class="menu-icon">☰</div>
        <nav id="navMenu">
            <div class="close-btn">&times;</div>
            <a href="../index.html"><span class="rgb-text">الرئيسية</span></a>
            <a href="browse.html"><span class="rgb-text">الدوبلاج</span></a>
            <a href="women.html"><span class="rgb-text">الفتيات</span></a>
            <a href="men.html"><span class="rgb-text">الشباب</span></a>
            <a href="competition.html"><span class="rgb-text">المسابقات</span></a>
        </nav>
    </header>


    <div class="container section-padding">
        <h2 class="section-title">مكتبة تدريب <span class="rgb-text">الشباب</span></h2>
        <div id="video-grid" class="video-grid" data-category="men"></div>
    </div>
    <div id="adModal" class="modal">
        <div class="modal-content">
            <div class="ad-placeholder">مساحة إعلانية لدعم سيرفرات الأكاديمية</div>
            <p>انتظر <span id="countdown" class="rgb-text">5</span> ثوانٍ لتشغيل المشغل...</p>
            <button class="close-ad" onclick="openVideo()">تخطي ومشاهدة المقطع</button>
        </div>
    </div>
    <div id="videoModal" class="modal">
        <div class="modal-content video-modal-content">
            <button class="close-video" onclick="closeVideo()">× إغلاق العرض</button>
            <div id="server-tabs" class="server-tabs-container"></div>
            <div class="video-wrapper">
                <iframe id="mainVideoFrame" src="" allowfullscreen></iframe>
            </div>
        </div>
    </div>
    <footer>
        <a href="legal.html">سياسة الخصوصية</a> | <a href="#">تواصل معنا</a>
        <p>&copy; 2026 أكاديمية Black Echo.</p>
    </footer>
    <script src="../data/data.js"></script>
    <script src="../data/script.js"></script>


    <script>
        // سكريبت القائمة الجانبية للهاتف
        document.addEventListener('DOMContentLoaded', () => {
            const menuIcon = document.querySelector('.menu-icon');
            const navMenu = document.getElementById('navMenu');
            const closeBtn = document.querySelector('.close-btn');
            if(menuIcon && navMenu) menuIcon.addEventListener('click', () => navMenu.classList.add('active'));
            if(closeBtn && navMenu) closeBtn.addEventListener('click', () => navMenu.classList.remove('active'));
        });
    </script>
</body>
</html>
