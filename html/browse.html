<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تصفح الأعمال - Black Echo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/catalog_style.css">
    <link rel="icon" type="image/png" href="../icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        .full-width-hero {
            width: 100%;
            height: 480px; /* طول البانر المناسب للشاشات الكبيرة */
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
            background-color: #0e1016;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
            display: flex;
            align-items: flex-end;
            padding: 50px 8%;
            box-sizing: border-box;
            cursor: pointer;
        }

        .hero-slide.active {
            opacity: 1;
            visibility: visible;
        }

        /* تظليل أسود سينمائي لدمج البانر مع خلفية الموقع وإبراز النصوص */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #0e1016 8%, rgba(14, 16, 22, 0.3) 50%, rgba(14, 16, 22, 0.7) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 650px;
            text-align: right;
        }

        .hero-content h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: #fff;
            margin-bottom: 12px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9);
            line-height: 1.3;
        }

        .hero-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .hero-meta .rating {
            color: #ffb800;
            font-weight: bold;
        }

        .hero-meta .badge {
            background: var(--accent-red, #ff3838);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .hero-meta .type {
            color: #b2bec3;
        }

        .hero-btn {
            background: var(--accent-red, #ff3838);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 56, 56, 0.4);
        }

        .hero-btn:hover {
            background: #ff1e1e;
            transform: scale(1.05);
        }

        /* توافق تام مع شاشات الهواتف */
        @media (max-width: 768px) {
            .full-width-hero {
                height: 340px;
            }
            .hero-content h1 {
                font-size: 1.8rem;
            }
            .hero-slide {
                padding: 30px 5%;
            }
        }
    </style>
</head>
<body class="animated-bg">

     <header class="main-header">
    <div class="logo">

    </div>

    <nav id="navMenu">

        <a href="women.html"><span class="rgb-text">الفتيات</span></a>

    <div id="hero-slider" class="full-width-hero"></div>

<!-- نافذة المشاهدة داخل الموقع -->
    <div id="videoModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div class="modal-content" style="width: 90%; max-width: 900px; background: #11131a; padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
            <button onclick="closeVideo()" style="background: var(--accent-red); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; float: left; margin-bottom: 15px; font-weight: bold;">إغلاق المشاهدة ✖</button>
