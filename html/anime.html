<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تفاصيل العمل - Black Echo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/anime_style.css">
    <link rel="icon" type="image/png" href="../icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
</head>
<body class="animated-bg">

<header class="main-header">
    <div class="logo">
        <div class="logo rgb-text">ArabDub Hub</div>    
    </div>
    
    <div class="menu-icon">☰</div>
    
    <nav id="navMenu">
        <div class="close-btn">&times;</div>
        <a href="../index.html"><span class="rgb-text">الرئيسية</span></a>
        <a href="browse.html"><span class="rgb-text">الدوبلاج</span></a>
        <a href="women.html"><span class="rgb-text">الفتيات</span></a>
        <a href="men.html"><span class="rgb-text">الشباب</span></a>
        <a href="competition.html"><span class="rgb-text">المسابقات</span></a>
    </nav>
</header>

<div class="anime-cover-section" id="anime-cover">
    <div class="cover-overlay">
        <div class="container anime-details-content">
            <div class="anime-poster">
                <img id="anime-poster-img" src="" alt="Poster">
            </div>
            <div class="anime-info">
                <h1 id="anime-title">جاري التحميل...</h1>
                <div class="anime-meta">
                    <span id="anime-status" class="meta-tag status">مستمر</span>
                    <span id="anime-type" class="meta-tag type">مسلسل</span>
                    <span id="anime-rating" class="meta-tag rating">★ 9.5</span>
                </div>
                <p id="anime-story" class="anime-story">القصة تُحمل...</p>
                <div class="genres" id="anime-genres"></div>
            </div>
        </div>
    </div>
</div>

<div class="container section-padding">

    <!-- قسم مشغل الفيديو المحدث مع السيرفرات -->
    <div id="video-player-container" style="display: none; margin-bottom: 40px; max-width: 900px; margin-left: auto; margin-right: auto;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 id="playing-episode-title" style="color: #fff; font-size: 1.2rem; border-right: 3px solid var(--accent-red); padding-right: 10px; margin: 0;">جاري التشغيل...</h3>
            <button onclick="closeInlinePlayer()" style="background: #e50914; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s;">إغلاق الحلقة ✖</button>
        </div>

        <div class="video-wrapper" style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; border: 2px solid var(--accent-red); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); background: #000;">
            <iframe id="video-iframe" src="" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" scrolling="no" allow="autoplay; fullscreen"></iframe>
        </div>
        <!-- حاوية أزرار السيرفرات المتعددة -->
        <div id="servers-container" class="servers-list" style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
            <!-- يتم توليد الأزرار تلقائياً هنا -->
        </div>
    </div>

    <div class="episodes-header">
        <h2>الحلقات المدبلجة</h2>
        <span class="ep-count" id="ep-count">0 حلقة</span>
    </div>
    
    <div class="episodes-grid" id="episodes-grid">
    </div>
</div>

<script src="../data/anime_db.js"></script>
<script src="../data/anime_script.js"></script>
<script src="../data/script.js"></script>
</body>
</html>
