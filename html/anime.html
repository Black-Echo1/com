<div class="anime-cover-section" id="anime-cover">
    <div class="cover-overlay">
        <div class="container anime-details-content">
            <div class="anime-poster">
                <img id="anime-poster-img" src="" alt="Poster">
            </div>
            <div class="anime-info">
                <h1 id="anime-title">جاري التحميل...</h1>
                <div class="anime-meta">
                    <span id="anime-status" class="meta-tag status">مستمر</span>
                    <span id="anime-type" class="meta-tag type">مسلسل</span>
                    <span id="anime-rating" class="meta-tag rating">★ 9.5</span>
                </div>
                <p id="anime-story" class="anime-story">القصة تُحمل...</p>
                <div class="genres" id="anime-genres"></div>
            </div>
        </div>
    </div>
</div>

<div class="container section-padding">

    <div id="video-player-container" style="display: none; margin-bottom: 40px;">
        <div class="video-wrapper" style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; border: 2px solid var(--accent-red); box-shadow: 0 0 20px rgba(229, 9, 20, 0.4); background: #000;">
            <iframe id="video-iframe" src="" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
        <h3 id="playing-episode-title" style="margin-top: 15px; color: #fff; font-size: 1.2rem; border-right: 3px solid var(--accent-red); padding-right: 10px;">جاري التشغيل...</h3>
    </div>

    <div class="episodes-header">
        <h2>الحلقات المدبلجة</h2>
        <span class="ep-count" id="ep-count">0 حلقة</span>
    </div>
    
    <div class="episodes-grid" id="episodes-grid">
        </div>
</div>
