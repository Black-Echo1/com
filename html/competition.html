<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="V5K4gME715mhjvvhA7y2I6dHxR_x2pxBjrQPpJE_d04" />
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>المسابقات - Black Echo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../icon-192.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../css/style.css">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('../sw.js').catch(err => console.log('SW Error:', err));
        });
      }
    </script>
</head>
<body class="animated-bg">
   <header class="main-header">
        <div class="logo">
            <div class="logo rgb-text">ArabDub Hub</div>    
        </div>
        <div class="menu-icon">☰</div>
        <nav id="navMenu">
            <div class="close-btn">&times;</div>
            <a href="../index.html"><span class="rgb-text">الرئيسية</span></a>
            <a href="browse.html"><span class="rgb-text">الدوبلاج</span></a>
            <a href="women.html"><span class="rgb-text">الفتيات</span></a>
            <a href="men.html"><span class="rgb-text">الشباب</span></a>
            <a href="competition.html"><span class="rgb-text">المسابقات</span></a>
        </nav>
    </header>


    <div class="container section-padding">
        <h2 class="section-title" id="comp-week-title" style="color: var(--accent-gold); text-shadow: 0 0 15px rgba(241,196,15,0.3);">جاري تحميل المسابقة...</h2>
        <p style="text-align: center; color: var(--text-gray); margin-bottom: 40px; font-size: 0.95rem;">شاهد إبداعات أعضاء الفريق وصوّت للأداء المفضل لديك. (يحق لك التصويت مرة واحدة فقط) لم تبدأ بعد</p>
        <div id="competition-grid" class="video-grid"></div>
    </div>
    <div id="videoModal" class="modal">
        <div class="modal-content video-modal-content">
            <button class="close-video" onclick="closeVideo()">إغلاق المشهد</button>
            <div style="clear: both;"></div>
            <div class="video-wrapper">
                <iframe id="mainVideoFrame" src="" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen="true"></iframe>
            </div>
        </div>
    </div>
    <footer><p>&copy; 2026 أكاديمية Black Echo.</p></footer>
    <script src="../data/competition_data.js"></script>
    <script src="../data/script.js"></script>


    <script>
        // سكريبت القائمة الجانبية للهاتف
        document.addEventListener('DOMContentLoaded', () => {
            const menuIcon = document.querySelector('.menu-icon');
            const navMenu = document.getElementById('navMenu');
            const closeBtn = document.querySelector('.close-btn');
            if(menuIcon && navMenu) menuIcon.addEventListener('click', () => navMenu.classList.add('active'));
            if(closeBtn && navMenu) closeBtn.addEventListener('click', () => navMenu.classList.remove('active'));
        });
    </script>
</body>
</html>
